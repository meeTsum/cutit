<div class="relative z-10 flex flex-col items-center justify-center mx-auto px-4 py-20 text-center w-full max-w-[75%]">

  <!-- Titre de la section -->
  <div class="flex flex-col items-center justify-center mb-20">
    <h2 class="text-xl md:text-3xl text-main opacity-70">{{"FEATURES_TITLE" | trl}}</h2>
  </div>

  <!-- Grille de fonctionnalités -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-y-16 gap-x-8 w-full px-8">
    @for (feature of features; track feature.title; let i = $index) {
      <div class="relative flex flex-col items-center bg-site border border-gray-500/10 rounded-[2.5rem] shadow-xl p-6 pt-12 hover:-translate-y-2 hover:scale-[1.03] hover:shadow-[0_20px_40px_rgba(60,21,201,0.18)] transition-all duration-300 ease-out cursor-pointer group"
           appScrollReveal [revealDelay]="i * 150">

        <!-- Bloc Icône flottant -->

          <lucide-icon [name]="feature.icon" class="text-white w-8 h-8 stroke-1"></lucide-icon>
        </div>

        <!-- Texte -->
        <h3 class="text-base md:text-lg font-bold text-main mb-4">{{ feature.title }}</h3>

          {{ feature.description }}
        </p>
      </div>
    }
  </div>

</div>
