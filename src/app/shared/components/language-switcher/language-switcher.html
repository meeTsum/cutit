<div class="relative inline-block text-left font-sans">

  <!-- Déclencheur épuré -->
  <button (click)="toggleDropdown()"
          class="flex items-center gap-2 py-2 px-3 text-white hover:opacity-80 cursor-pointer transition-all duration-200">
    <span class="text-sm font-semibold tracking-wide uppercase">{{ selectedLang().code }}</span>
    <lucide-icon name="chevron-down" [size]="14" class="transition-transform duration-200" [class.rotate-180]="isOpen()"></lucide-icon>
  </button>

  <!-- Menu Dropdown Style macOS/iOS -->
  @if (isOpen()) {
    <div class="absolute right-0 mt-2 w-48 origin-top-right rounded-2xl bg-site-3 border border-main/10 shadow-[0_15px_35px_rgba(60,21,201,0.12)] p-1.5 z-50 backdrop-blur-md">
      <div class="flex flex-col gap-0.5">
        @for (lang of languages; track lang.code) {
          <button (click)="selectLanguage(lang)"
                  class="flex items-center gap-3 w-full px-3.5 py-2 text-[14px] font-medium transition-all duration-150 text-left rounded-xl cursor-pointer"
                  [class.bg-primary]="selectedLang().code === lang.code"
                  [class.text-white]="selectedLang().code === lang.code"
                  [class.text-main]="selectedLang().code !== lang.code"
                  [class.hover:bg-main/5]="selectedLang().code !== lang.code">
            <span class="text-base select-none">{{ lang.flag }}</span>
            <span class="opacity-90">{{ lang.label }}</span>
          </button>
        }
      </div>
    </div>
  }

</div>
